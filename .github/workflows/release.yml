name: Release

on:
  workflow_dispatch:
    inputs:
      part:
        type: choice
        description: "Version part to bump (patch, minor, major)"
        required: true
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Bump version (${{ github.event.inputs.part }})
        run: pixi run python scripts/bump_version.py "${{ github.event.inputs.part }}"

      - name: Commit version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml pixi.toml
          git commit -m "chore(release): bump version (${{ github.event.inputs.part }})"

      - name: Create git tag
        run: |
          VERSION=$(python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          git tag "v${VERSION}"
          echo "VERSION=v${VERSION}" >> "$GITHUB_ENV"

      - name: Push branch and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ env.VERSION }}"

      - name: Version bump complete
        run: |
          echo "Successfully bumped version to: ${{ env.VERSION }}"
          echo "Tag created and pushed: ${{ env.VERSION }}"
          echo "Changes committed to main branch"

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Validate tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
