name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        test-group:
          - { name: "unit", path: "tests/unit" }
          - { name: "integration", path: "tests/integration" }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Enforce no new deprecated BaseExecutionInfo usage
        run: |
          count=$(grep -rn "BaseExecutionInfo" . \
            --include="*.py" \
            --exclude-dir=".pixi" \
            | grep -v "scylla/core/results.py" \
            | grep -v "scylla/core/__init__.py" \
            | grep -v "# deprecated" \
            | grep -v "(deprecated)" \
            | grep -v "test_results.py" \
            | wc -l)
          echo "BaseExecutionInfo usage count (excluding definition, re-export, and tests): $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count usages of deprecated BaseExecutionInfo — remove before merging"
            grep -rn "BaseExecutionInfo" . --include="*.py" --exclude-dir=".pixi" \
              | grep -v "scylla/core/results.py" \
              | grep -v "scylla/core/__init__.py" \
              | grep -v "# deprecated" \
              | grep -v "(deprecated)" \
              | grep -v "test_results.py"
            exit 1
          fi

      - name: Enforce no new deprecated BaseRunMetrics usage
        run: |
          count=$(grep -rn "BaseRunMetrics" . \
            --include="*.py" \
            --exclude-dir=".pixi" \
            | grep -v "scylla/core/results.py" \
            | grep -v "# deprecated" \
            | grep -v "(deprecated)" \
            | grep -v "test_results.py" \
            | wc -l)
          echo "BaseRunMetrics usage count (excluding definition and tests): $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count usages of deprecated BaseRunMetrics — remove before merging"
            grep -rn "BaseRunMetrics" . --include="*.py" --exclude-dir=".pixi" \
              | grep -v "scylla/core/results.py" \
              | grep -v "# deprecated" \
              | grep -v "(deprecated)" \
              | grep -v "test_results.py"
            exit 1
          fi

      - name: Enforce tier label consistency in metrics-definitions.md
        run: |
          BAD_PATS="T3.{0,10}Tool|T4.{0,10}Deleg|T5.{0,10}Hier|T2.{0,10}Skill|T2.{0,10}Deleg|T3.{0,10}Hier|T4.{0,10}Hybrid|T1.{0,10}Tool|T0.{0,10}Skill|T1.{0,10}Prompt|T2.{0,10}Prompt|T3.{0,10}Skill|T4.{0,10}Tool|T5.{0,10}Deleg|T6.{0,10}Hier|T6.{0,10}Hybrid|T0.{0,10}Tool|T0.{0,10}Deleg|T5.{0,10}Skill|T6.{0,10}Deleg"
          count=$(grep -En "$BAD_PATS" \
            .claude/shared/metrics-definitions.md | wc -l)
          echo "Bad tier label count: $count"
          if [ "$count" -gt "0" ]; then
            echo "::error::Found $count tier label mismatch(es) in metrics-definitions.md"
            grep -En "$BAD_PATS" .claude/shared/metrics-definitions.md
            exit 1
          fi

      - name: Check Python version consistency (pyproject.toml vs Dockerfile)
        run: python3 scripts/check_python_version_consistency.py

      - name: Check version consistency (pyproject.toml, pixi.toml, scylla/__init__.py)
        run: python3 scripts/check_version_consistency.py

      - name: Install nats-server
        if: matrix.test-group.name == 'integration'
        run: |
          curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.10.24/nats-server-v2.10.24-linux-amd64.tar.gz | tar xz
          sudo mv nats-server-v2.10.24-linux-amd64/nats-server /usr/local/bin/
          nats-server --version

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      # Early gate: fail fast if pixi.lock is out of date before running expensive tests.
      # Catches the common rebase issue (pixi.lock SHA256 invalidated by source change)
      # early, before spending minutes on test execution. Runs after pixi is available.
      - name: Validate pixi.lock is up-to-date
        run: |
          if ! pixi install --locked 2>/dev/null; then
            echo "::error::pixi.lock is stale — run 'pixi install' locally and commit pixi.lock"
            exit 1
          fi

      - name: Check doc/config consistency
        if: matrix.test-group.name == 'unit'
        run: pixi run python scripts/check_doc_config_consistency.py --verbose

      - name: Check CHANGELOG version entry
        if: matrix.test-group.name == 'unit'
        run: pixi run python scripts/check_changelog_version.py --verbose

      - name: Enforce tests/unit/ structure conventions
        if: matrix.test-group.name == 'unit'
        run: pixi run python scripts/check_unit_test_structure.py

      - name: Validate config schemas
        if: matrix.test-group.name == 'unit'
        run: pixi run python scripts/validate_config_schemas.py config/defaults.yaml config/models/*.yaml tests/fixtures/config/tiers/*.yaml

      - name: Check cyclomatic complexity
        if: matrix.test-group.name == 'unit'
        run: pixi run python scripts/check_max_complexity.py --threshold 10

      - name: Run ${{ matrix.test-group.name }} tests
        env:
          TEST_PATH: ${{ matrix.test-group.path }}
        run: |
          # Install package in dev mode for unit tests
          JUNITXML="junit-${{ matrix.test-group.name }}.xml"
          if [[ "$TEST_PATH" == "tests/unit" ]]; then
            pixi run pip install -e .
            pixi run pytest "$TEST_PATH" --override-ini="addopts=" -v --strict-markers \
              --cov=scylla --cov-report=term-missing --cov-report=xml --cov-fail-under=75 \
              --junitxml="$JUNITXML"
          else
            # Integration tests: 5% floor prevents regression without blocking new work
            # --reruns 2: retry flaky integration tests (network/API calls) up to 2 times
            pixi run pytest "$TEST_PATH" -v \
              --cov=scylla --cov-report=term-missing --cov-report=xml --cov-fail-under=5 \
              --reruns 2 --reruns-delay 5 \
              --junitxml="$JUNITXML"
          fi

      - name: Upload coverage
        if: matrix.test-group.name == 'unit'
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5
        with:
          files: ./coverage.xml
          flags: ${{ matrix.test-group.name }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-results-${{ matrix.test-group.name }}
          path: |
            coverage.xml
            junit-${{ matrix.test-group.name }}.xml
          retention-days: 7
