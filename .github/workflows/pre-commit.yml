name: Pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi
        with:
          environment: lint

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Use lightweight lint environment (skips heavy scientific packages)
          pixi install --environment lint
          pixi --version
          pixi run --environment lint pre-commit run --all-files --show-diff-on-failure

      - name: Enforce complexity limit (C901)
        run: pixi run --environment lint ruff check --select C901 scylla/ scripts/

      - name: Upload pre-commit diff
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pre-commit-diffs
          retention-days: 7
          path: |
            .git/pre-commit-*
