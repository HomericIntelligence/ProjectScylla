name: Shell Tests

on:
  pull_request:
    paths:
      - "**/*.sh"
      - "tests/shell/**"
      - "docker/entrypoint.sh"
      - ".github/workflows/shell-test.yml"
  push:
    branches: [main]

jobs:
  bats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Pixi
        uses: ./.github/actions/setup-pixi

      - name: Run shell tests
        run: pixi run test-shell
        env:
          PREFLIGHT_INTEGRATION: "0"
